version: '3.8'

services:
  api:
    image: neuroscan-api:latest
    build: .
    container_name: neuroscan_api
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints
    environment:
      - NEUROSCAN_SEG_CKPT=/app/checkpoints/neuroscan_seg.keras
      - NEUROSCAN_CLS_CKPT=/app/checkpoints/neuroscan_cls.keras
    restart: unless-stopped

  web:
    image: neuroscan-web:latest
    build: .
    container_name: neuroscan_web
    command: python -m streamlit run app/dashboard.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    volumes:
      - ./checkpoints:/app/checkpoints
    environment:
      - NEUROSCAN_SEG_CKPT=/app/checkpoints/neuroscan_seg.keras
      - NEUROSCAN_CLS_CKPT=/app/checkpoints/neuroscan_cls.keras
      # In a truly decoupled setup, Streamlit would call the API.
      # For now, it runs locally but shares the same environment.
    depends_on:
      - api
    restart: unless-stopped
